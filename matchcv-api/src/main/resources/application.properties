spring.application.name=matchcv-api

# Cassandra
spring.cassandra.contact-points=${DB_HOST}
spring.cassandra.port=${DB_PORT}
spring.cassandra.keyspace-name=${DB_KEYSPACE}
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.schema-action=none

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Admin API Key
admin.api-key=${ADMIN_API_KEY}

# LLM (LM Studio / OpenAI-compatible)
llm.api-url=${LLM_API_URL}
llm.model-name=${LLM_MODEL_NAME}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.price.pro-monthly=${STRIPE_PRICE_PRO_MONTHLY}
stripe.price.pro-yearly=${STRIPE_PRICE_PRO_YEARLY}
stripe.price.lifetime=${STRIPE_PRICE_LIFETIME}

# App
app.base-url=${APP_BASE_URL:http://localhost:3000}
